<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perudo — Liar's Dice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Elimination overlay -->
  <div id="elimination-overlay" class="hidden">
    <div id="elimination-name"></div>
    <div id="dice-particles"></div>
  </div>

  <!-- LIAR overlay -->
  <div id="liar-overlay" class="hidden">
    <div id="liar-text">LIAR!</div>
    <div id="liar-caller"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- ═══════════════════════════════════════ -->
  <!-- SCREEN: Name entry                      -->
  <!-- ═══════════════════════════════════════ -->
  <div id="screen-name" class="screen active">
    <div class="card">
      <div class="logo">⚅</div>
      <h1>Perudo</h1>
      <p class="tagline">Liar's Dice</p>
      <input id="name-input" type="text" placeholder="Enter your name to join…" maxlength="20"
             autocomplete="off" spellcheck="false">
      <button id="name-submit" class="btn btn-primary">Join Lobby →</button>
      <p id="name-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!-- SCREEN: Lobby                           -->
  <!-- ═══════════════════════════════════════ -->
  <div id="screen-lobby" class="screen">
    <div class="card">
      <h2>Lobby</h2>
      <p class="lobby-hint">Waiting for players — share this page to invite friends!</p>
      <div id="lobby-players"></div>
      <button id="btn-start" class="btn btn-primary hidden">Start Game</button>
      <p id="start-hint" class="muted-msg"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!-- SCREEN: Game                            -->
  <!-- ═══════════════════════════════════════ -->
  <div id="screen-game" class="screen">

    <div id="players-bar"></div>

    <div id="game-center">

      <div id="round-banner">
        <span id="round-label">Round 1</span>
        <span id="palifico-badge" class="hidden">🔥 PALIFICO</span>
      </div>

      <!-- Bid + Quick Maths side by side -->
      <div id="info-row">
        <div id="bid-display">
          <div class="info-label">Current Bid</div>
          <div id="bid-display-value" class="bid-display-value"></div>
          <div id="bid-display-by" class="info-sub"></div>
        </div>
        <div id="quick-maths">
          <div class="info-label">Quick Maths</div>
          <div id="qm-value" class="qm-value">—</div>
          <div class="info-sub">avg per face (÷3)</div>
        </div>
      </div>

      <div id="status-bar"></div>

      <div id="my-dice-section">
        <div class="section-label">Your Dice
          <span id="total-dice-note" class="muted-msg"></span>
        </div>
        <div id="my-dice"></div>
      </div>

      <!-- Action UI — only shown on your turn -->
      <div id="action-ui" class="hidden">
        <div id="palifico-notice" class="hidden">🔥 PALIFICO ROUND — no wilds, same face only</div>
        <div id="bid-controls">
          <div class="control-group">
            <label>Quantity</label>
            <div class="qty-control">
              <button id="qty-down" class="btn-stepper">−</button>
              <span id="qty-val">1</span>
              <button id="qty-up" class="btn-stepper">+</button>
            </div>
          </div>
          <div class="control-group">
            <label>Face</label>
            <div id="face-picker"><!-- populated by JS --></div>
          </div>
        </div>
        <div id="bid-hint-msg"></div>
        <div id="action-buttons">
          <button id="btn-bid" class="btn btn-primary" disabled>Make Bid</button>
          <button id="btn-challenge" class="btn btn-danger" disabled>Liar</button>
        </div>
      </div>

    </div><!-- /#game-center -->

    <!-- Reveal overlay -->
    <div id="reveal-overlay" class="hidden">
      <div id="reveal-panel">
        <h2 id="reveal-title">The Dice Are Revealed</h2>
        <div id="reveal-all-dice"></div>
        <div id="reveal-summary"></div>
      </div>
    </div>

  </div><!-- /#screen-game -->

  <!-- ═══════════════════════════════════════ -->
  <!-- SCREEN: Game Over                       -->
  <!-- ═══════════════════════════════════════ -->
  <div id="screen-over" class="screen">
    <div class="card">
      <div class="winner-trophy">⚅</div>
      <h1 class="winner-title">Winner!</h1>
      <div id="winner-name" class="winner-name"></div>
      <button id="btn-play-again" class="btn btn-primary">Play Again</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
